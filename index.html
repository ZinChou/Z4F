<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐</title>

<link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#ffffff;
--text:#2c2c2c;
--accent:#ff6b81;
--accent2:#ffd166;
}

*{box-sizing:border-box}

html,body{
margin:0;
background:var(--bg);
font-family:"Noto Serif SC",serif;
color:var(--text);
overflow-x:hidden;
}

canvas{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.page{
position:relative;
z-index:2;
max-width:1000px;
margin:auto;
padding:60px 20px 120px;
}

.hero{
text-align:center;
margin-bottom:40px;
position:relative;
}

.hero h1{
font-family:"Zhi Mang Xing",cursive;
font-size:90px;
margin:0;
color:#ff4d6d;
}

.hero .date{
margin-top:10px;
font-size:22px;
color:#888;
letter-spacing:2px;
}

.decor{
position:absolute;
width:60px;
height:60px;
border-radius:50%;
background:radial-gradient(circle,var(--accent2),transparent);
opacity:.6;
}

.decor.one{left:10%;top:-10px}
.decor.two{right:15%;top:20px}
.decor.three{left:20%;bottom:-20px}

/* 信 */

.letter{
background:linear-gradient(180deg,#ffffff,#fff7f9);
padding:40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
line-height:2;
font-size:20px;
margin-bottom:60px;
}

.cake{
text-align:center;
font-size:60px;
margin-bottom:10px;
animation:cakeFloat 3s ease-in-out infinite;
}

@keyframes cakeFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

.salutation{font-weight:600;margin-bottom:20px}
.paragraph{text-indent:2em;margin-bottom:16px}
.closing{margin-top:30px}
.signature{text-align:right;margin-top:10px;font-style:italic}
.postscript{margin-top:20px;font-size:15px;color:#777}

/* 照片 */

.photos{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:24px;
}

.photo{
background:white;
padding:12px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transform:rotate(-1deg);
transition:.3s;
}

.photo:nth-child(2){transform:rotate(2deg)}
.photo:nth-child(3){transform:rotate(-2deg)}

.photo:hover{transform:scale(1.05) rotate(0deg)}

.photo img{
width:100%;
border-radius:12px;
display:block;
}

/* 心 */

.heart{
position:fixed;
font-size:18px;
color:#ff6b81;
animation:float 8s linear infinite;
opacity:.6;
z-index:1;
}

@keyframes float{
0%{transform:translateY(100vh) scale(.8)}
100%{transform:translateY(-10vh) scale(1.2)}
}

/* 音乐按钮 */

.music{
position:fixed;
right:20px;
bottom:20px;
background:#ff6b81;
color:white;
border:none;
border-radius:50px;
padding:12px 18px;
font-size:14px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
cursor:pointer;
z-index:5;
}

</style>
</head>

<body>

<audio id="music" src="simple.mp3" loop></audio>

<button class="music" onclick="toggleMusic()">音乐开关</button>

<canvas id="fireworks"></canvas>

<div class="page">

<div class="hero">

<div class="decor one"></div>
<div class="decor two"></div>
<div class="decor three"></div>

<h1>生日快乐</h1>
<div class="date">（2026.2.12 - FOREVER）</div>

</div>

<div class="letter">

<div class="cake">🍓💗🫐</div>

<div class="salutation">亲爱的你：</div>

<p class="paragraph">这里写信的正文内容。</p>
<p class="paragraph">你可以写回忆、祝福、或者想说的话。</p>
<p class="paragraph">这是一封只属于今天的信。</p>

<div class="closing">生日快乐，愿未来的每一天都被温柔包围。</div>

<div class="signature">—— 你的名字</div>

<div class="postscript">P.S. 烟花会一直在天空中绽放。</div>

</div>

<div class="photos">

<div class="photo">
<img src="imgs/1.jpg">
</div>

<div class="photo">
<img src="imgs/2.jpg">
</div>

<div class="photo">
<img src="imgs/3.jpg">
</div>

</div>

</div>

<script>

/* 音乐 */

const music = document.getElementById("music")

music.volume = 0

function fadeInMusic(){

let v = 0
music.play().catch(()=>{})

const timer = setInterval(()=>{
v += 0.02
if(v >= 1){
v = 1
clearInterval(timer)
}
music.volume = v
},120)

}

window.addEventListener("load",fadeInMusic)

document.addEventListener("click",()=>{
music.play()
},{once:true})

function toggleMusic(){
if(music.paused) music.play()
else music.pause()
}

/* hearts */

setInterval(()=>{

const h=document.createElement("div")
h.className="heart"
h.innerHTML="❤"
h.style.left=Math.random()*100+"vw"
h.style.animationDuration=6+Math.random()*6+"s"

document.body.appendChild(h)

setTimeout(()=>h.remove(),12000)

},900)

/* fireworks */

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

let w=window.innerWidth
let h=window.innerHeight

canvas.width=w
canvas.height=h

window.addEventListener("resize",()=>{

w=window.innerWidth
h=window.innerHeight

canvas.width=w
canvas.height=h

})

let fireworks=[]
let particles=[]

class Firework{

constructor(){

this.x=Math.random()*w
this.y=h
this.targetY=120+Math.random()*280
this.speed=6+Math.random()*2
this.color=Math.random()*360

}

update(){

this.y-=this.speed

if(this.y<=this.targetY){

explode(this.x,this.y,this.color)
return true

}

return false

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,3,0,Math.PI*2)
ctx.fillStyle=`hsl(${this.color},100%,60%)`
ctx.fill()

}

}

class Particle{

constructor(x,y,color){

const angle=Math.random()*Math.PI*2
const speed=Math.random()*6

this.x=x
this.y=y
this.vx=Math.cos(angle)*speed
this.vy=Math.sin(angle)*speed
this.life=80
this.color=color

}

update(){

this.x+=this.vx
this.y+=this.vy
this.vy+=0.04
this.life--

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,2,0,Math.PI*2)
ctx.fillStyle=`hsl(${this.color},100%,60%)`
ctx.fill()

}

}

function explode(x,y,color){

for(let i=0;i<90;i++){

particles.push(new Particle(x,y,color))

}

}

function animate(){

ctx.fillStyle="rgba(255,255,255,.25)"
ctx.fillRect(0,0,w,h)

for(let i=fireworks.length-1;i>=0;i--){

const f=fireworks[i]

if(f.update()) fireworks.splice(i,1)
else f.draw()

}

particles.forEach((p,i)=>{

p.update()
p.draw()

if(p.life<=0) particles.splice(i,1)

})

requestAnimationFrame(animate)

}

setInterval(()=>{

const count=1

for(let i=0;i<count;i++){
fireworks.push(new Firework())
}

},1000)

animate()

</script>

</body>
</html>
